<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>十个勤天 · 粉丝信息登记</title>
    <link rel="stylesheet" href="十个勤天信息登记表.css">
    <!-- 可选：引入字体图标增强视觉 -->
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 新增背景容器，融入农耕/田野元素 -->
    <div class="bg-container">
        <form action="十个勤天布局.html" method="get" autocomplete="off" target="block">
            <!-- 新增主题头图 -->
            <div class="title-box">
                <i class="fa-solid fa-seedling"></i>
                <h2>十个勤天 · 信息登记表</h2>
            </div>
            
            <p class="form-item">
                <span>账号：</span>
                <input type="text" name="user_name" id="userName" placeholder="请输入十个勤天专属账号" required autofocus/>
            </p>
            <p class="form-item">
                <span>密码：</span>
                <input type="password" name="password" id="passWord" placeholder="请输入密码" required/>
            </p>
            <p class="form-item">
                <span>打开网页：</span>
                <select id="pageSelect" required class="select-box">
                    <option value="">请选择</option>
                    <option value="十个勤天.html">网页A · 勤天主页</option>
                    <option value="十个勤天布局.html">网页B · 布局展示</option>
                    <option value="十个勤天音乐播放页面.html">网页C · 音乐动画</option>
                </select>
            </p>

            <p class="btn">
                <input type="button" id="goBtn" value="提交打开" onclick="loginCheck()">
                <input type="reset" value="重置" class="reset-btn">
            </p>
        </form>
        <!-- 底部装饰文案 -->
        <div class="footer-text">
            十个勤天，缺一不可 · 禾伙人专属登记
        </div>
    </div>

    <script>
    // 原有登录验证逻辑保留
    function loginCheck() {
        let rightUser = "shigeqintian";
        let rightPwd = "123456";
        let userName = document.getElementById("userName").value.trim();
        let passWord = document.getElementById("passWord").value.trim();
        let url = document.getElementById("pageSelect").value;

        if(userName !== rightUser || passWord !== rightPwd) {
            alert("账号或密码错误，请重新输入！");
            return;
        }
        if(!url) {
            alert("请选择要打开的网页！");
            return;
        }
        window.open(url, "_blank");
    }
    </script>
</body>
</html>
